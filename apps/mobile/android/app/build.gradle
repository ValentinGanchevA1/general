apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
apply plugin: "com.google.gms.google-services"

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    /* Folders */
    //   The root of your project, i.e. where "package.json" lives. Default is '../..'
    // root = file("../../")
    //   The folder where the react-native NPM package is. Default is ../../node_modules/react-native
    // reactNativeDir = file("../../node_modules/react-native")
    //   The folder where the react-native Codegen package is. Default is ../../node_modules/@react-native/codegen
    // codegenDir = file("../../node_modules/@react-native/codegen")
    //   The cli.js file which is the React Native CLI entrypoint. Default is ../../node_modules/react-native/cli.js
    // cliFile = file("../../node_modules/react-native/cli.js")

    /* Variants */
    //   The list of variants to that are debuggable. For those we're going to
    //   skip the bundling of the JS bundle and the assets. By default is just 'debug'.
    //   If you add flavors like lite, prod, etc. you'll have to list your debuggableVariants.
    // debuggableVariants = ["liteDebug", "prodDebug"]

    /* Bundling */
    //   A list containing the node command and its flags. Default is just 'node'.
    // nodeExecutableAndArgs = ["node"]
    //
    //   The command to run when bundling. By default is 'bundle'
    // bundleCommand = "ram-bundle"
    //
    //   The path to the CLI configuration file. Default is empty.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   The name of the generated asset file containing your JS bundle
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   The entry file for bundle generation. Default is 'index.android.js' or 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    //
    //   A list of extra flags to pass to the 'bundle' commands.
    //   See https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
    // extraPackagerArgs = []

    /* Hermes Commands */
    //   RN 0.83 ships the Hermes compiler in the separate `hermes-compiler` package
    //   instead of `react-native/sdks/hermesc`. Under pnpm the default lookup path
    //   doesn't exist, so the bundle task fails with "Couldn't determine Hermesc
    //   location". Point it at the real binary in the pnpm store.
    //   The command to use to compile the hermes bytecode. Do NOT hardcode the
    //   hermes-compiler version in this path — pnpm resolves whatever version
    //   react-native's package.json currently pins (check apps/mobile/node_modules/
    //   react-native/package.json's "hermes-compiler" dep), and that version
    //   changes on every `pnpm update`/`pnpm install` that bumps react-native.
    //   A hardcoded version here silently rots: the path stops existing, and
    //   Gradle fails with "A problem occurred starting process" pointing at a
    //   hermesc binary that was never there. Resolve it dynamically instead.
    def osBin = org.gradle.internal.os.OperatingSystem.current().isWindows() ? "win64-bin" :
                (org.gradle.internal.os.OperatingSystem.current().isMacOsX() ? "osx-bin" : "linux64-bin")
    def hermescExe = org.gradle.internal.os.OperatingSystem.current().isWindows() ? "hermesc.exe" : "hermesc"
    def pnpmStoreDir = file("$rootDir/../../../node_modules/.pnpm")
    def hermesCompilerDir = pnpmStoreDir.listFiles()?.find { it.name.startsWith("hermes-compiler@") }
    if (hermesCompilerDir == null) {
        throw new GradleException(
            "No hermes-compiler@* directory found under ${pnpmStoreDir}. " +
            "Run `pnpm install` at the repo root first."
        )
    }
    hermesCommand = "${hermesCompilerDir}/node_modules/hermes-compiler/hermesc/$osBin/$hermescExe"
    //
    //   The list of flags to pass to the Hermes compiler. By default is "-O", "-output-source-map"
    // hermesFlags = ["-O", "-output-source-map"]

    /* Autolinking */
    autolinkLibrariesWithApp()
}

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = false

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = io.github.react-native-community:jsc-android-intl:2026004.+`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

// Release (upload) signing — credentials come from local.properties (CI appends
// them from GitHub secrets; nothing secret is committed). When absent, release
// builds fall back to the debug key so local `bundleRelease` smoke tests still work.
def releaseStoreFile = localProperties.getProperty('RELEASE_STORE_FILE')
def hasReleaseSigning = releaseStoreFile != null && rootProject.file(releaseStoreFile).exists()

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.g88"
    defaultConfig {
        applicationId "com.g88"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        // versionCode auto-bumps in CI via -PversionCodeOverride=<run number>;
        // Play rejects duplicate versionCodes across uploads. Defaults to 1 locally.
        versionCode (project.hasProperty('versionCodeOverride') ? project.versionCodeOverride.toInteger() : 1)
        versionName "1.0"
        buildConfigField "String", "GOOGLE_MAPS_API_KEY_DEBUG", "\"${localProperties.getProperty('GOOGLE_MAPS_API_KEY_DEBUG', '')}\""
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (hasReleaseSigning) {
                storeFile rootProject.file(releaseStoreFile)
                storePassword localProperties.getProperty('RELEASE_STORE_PASSWORD')
                keyAlias localProperties.getProperty('RELEASE_KEY_ALIAS')
                keyPassword localProperties.getProperty('RELEASE_KEY_PASSWORD')
            }
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            manifestPlaceholders = [
                GOOGLE_MAPS_API_KEY: localProperties.getProperty('GOOGLE_MAPS_API_KEY_DEBUG', ''),
                usesCleartextTraffic: 'true'
            ]
        }
        release {
            manifestPlaceholders = [
                GOOGLE_MAPS_API_KEY: localProperties.getProperty('GOOGLE_MAPS_API_KEY_RELEASE', ''),
                usesCleartextTraffic: 'false'
            ]
            // Use the upload key when configured (CI / release builds); fall back to
            // the debug key locally so `bundleRelease` smoke tests don't require secrets.
            signingConfig hasReleaseSigning ? signingConfigs.release : signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")
    implementation("com.google.android.gms:play-services-maps:19.1.0")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
