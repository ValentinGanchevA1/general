packages:
  - "apps/*"
  - "packages/*"
allowBuilds:
  '@nestjs/core': true
  '@sentry/cli': true
  bcrypt: true
  protobufjs: true
  '@firebase/util': true
minimumReleaseAgeExclude:
  - joi@17.13.4
overrides:
  'glob@10': '10.5.0'
  'picomatch@4': '4.0.4'
  'ws@8': '8.20.1'
  'webpack@5': '5.104.1'
  'ajv@8': '8.20.0'
  tmp: '0.2.7'
  '@tootallnate/once': '>=3.0.1'
  fast-xml-parser: '>=5.7.0'
  uuid: '>=11.1.1'
  shell-quote: '>=1.8.4' # GHSA-w7jw-789q-3m8p (transitive via @react-native-community/cli-tools)
  'joi@17': '>=17.13.4 <18' # GHSA-q7cg-457f-vx79 / CVE-2026-48038 (transitive via @react-native-community/cli)

# Explicitly NOT in the workspace:
#   legacy/**   — frozen pre-monorepo layout (read-only reference)
#                 See legacy/README.md and STATUS.md.
