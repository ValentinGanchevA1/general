name: Android APK (sideload)

# Builds a signed release **APK** for direct sharing / sideloading (not the Play
# Store — that's android-release.yml's AAB). The APK is signed with the same
# upload keystore as the AAB, so it has a stable signing identity: updates built
# here install over previous ones, and you whitelist a single SHA-1 on the Maps
# key.
#
# IMPORTANT (blank-map gotcha): a sideloaded APK keeps the *upload key's*
# signature (unlike a Play-distributed build, which Google re-signs with the App
# Signing key). So the SHA-1 that must be added to GOOGLE_MAPS_API_KEY_RELEASE's
# Android app restriction is the **upload key's** SHA-1 — printed by the
# "Print signing certificate fingerprints" step below — NOT the Play App Signing
# SHA-1. Add it once in Google Cloud Console → Credentials → the release Maps key.
#
# Trigger: manual via the Actions tab (once this file is on the default branch),
# or by pushing the ci/android-apk branch.
on:
  workflow_dispatch:
  push:
    branches:
      - ci/android-apk

permissions:
  contents: write   # create/update the GitHub Release that hosts the shareable APK

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  apk:
    name: Signed APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Inject Maps keys
        run: |
          cat >> android/local.properties <<EOF
          GOOGLE_MAPS_API_KEY_DEBUG=${{ secrets.GOOGLE_MAPS_API_KEY_DEBUG }}
          GOOGLE_MAPS_API_KEY_RELEASE=${{ secrets.GOOGLE_MAPS_API_KEY_RELEASE }}
          EOF

      - name: Inject google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json

      - name: Decode upload keystore
        run: echo "${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload.keystore

      - name: Inject release signing config
        run: |
          cat >> android/local.properties <<EOF
          RELEASE_STORE_FILE=app/upload.keystore
          RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS=${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
          EOF

      - name: Print signing certificate fingerprints
        run: |
          echo "Add the SHA1 below to GOOGLE_MAPS_API_KEY_RELEASE's Android app restriction"
          echo "(Cloud Console → APIs & Services → Credentials → the release Maps key)."
          echo "package: com.g88"
          keytool -list -v \
            -keystore android/app/upload.keystore \
            -storepass "${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}" \
            -alias "${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}" \
            | grep -E "SHA1:|SHA256:"

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build signed release APK
        # GOOGLE_WEB_CLIENT_ID / SENTRY_DSN are read via process.env at JS bundle
        # time (babel inline-env transform) — they must be present in the gradle
        # process env, otherwise they inline as '' and Google Sign-In + Sentry are
        # silently disabled in the APK. The web client id is public (OAuth web
        # client); SENTRY_DSN is a public DSN kept as a secret for hygiene.
        env:
          GOOGLE_WEB_CLIENT_ID: 689098029576-r7hoijre01nvocb25elp2q0ufb5v0geu.apps.googleusercontent.com
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon -PversionCodeOverride=${{ github.run_number }}

      - name: Verify the APK is not debug-signed
        run: |
          APK=android/app/build/outputs/apk/release/app-release.apk
          test -f "$APK" || { echo "::error::APK not produced"; exit 1; }
          # Fail loudly if the APK is still signed with the Android debug key
          # (would mean the upload keystore secrets are missing/misconfigured).
          if unzip -p "$APK" META-INF/*.RSA 2>/dev/null | keytool -printcert 2>/dev/null | grep -q "Android Debug"; then
            echo "::error::APK is debug-signed — upload keystore secrets are missing or misconfigured."
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: g88-release-apk
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14

      # Give the APK a stable, human-friendly filename so the
      # releases/latest/download/g88-v1.0.apk link is permanent.
      - name: Stage APK for release
        run: cp android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/g88-v1.0.apk

      # Publishes a GitHub Release per run with the signed APK attached. The
      # per-run tag (apk-v1.0.<run_number>) is immutable history; make_latest
      # keeps releases/latest/download/g88-v1.0.apk pointing at the newest build,
      # so the share link never changes. Full release (not prerelease) is
      # required for the /latest/ redirect to resolve.
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-v1.0.${{ github.run_number }}
          name: "G88 v1.0 (build ${{ github.run_number }}) — Android sideload APK"
          files: apps/mobile/android/app/build/outputs/apk/release/g88-v1.0.apk
          make_latest: "true"
          target_commitish: ${{ github.sha }}
          body: |
            Signed Android APK for direct install (sideload). Not the Play Store build.

            **Permanent download link** (always the newest build):
            https://github.com/${{ github.repository }}/releases/latest/download/g88-v1.0.apk

            ## Install
            1. On Android, allow installing from your browser/file manager (Settings → Apps → Special access → Install unknown apps).
            2. Download **g88-v1.0.apk** below and tap it to install.
            3. Or via ADB: `adb install g88-v1.0.apk`

            ## Notes
            - Signed with the G88 upload key (stable identity — builds install over each other).
            - Connects to the production backend (`api.g88.app`).
            - If the map is blank, the app's upload-key SHA-1 still needs whitelisting on the release Maps key.

            Commit: ${{ github.sha }} · Build: ${{ github.run_number }}
