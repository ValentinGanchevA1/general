name: Android Release (AAB)

# Builds a signed Android App Bundle for Google Play (closed testing / production).
# Manual via the Actions tab, or automatically on a v* tag push.
#
# The first upload to the Play Console must be done by hand (Play requires it to
# establish the app). After that, the auto-publish step below activates AUTOMATICALLY
# the moment a `PLAY_SERVICE_ACCOUNT_JSON` repo secret exists — until then it is skipped
# and this workflow only builds + uploads the .aab artifact (existing behavior). See DEPLOY.md.
on:
  workflow_dispatch:
    inputs:
      track:
        description: "Play track to publish to when auto-publish is active (internal/alpha/beta/production)"
        required: false
        default: "internal"
      publish:
        description: "Publish to Play (only runs if PLAY_SERVICE_ACCOUNT_JSON is set). Set false to build artifact only."
        required: false
        default: "true"
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Signed AAB
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Inject Maps keys
        run: |
          cat >> android/local.properties <<EOF
          GOOGLE_MAPS_API_KEY_DEBUG=${{ secrets.GOOGLE_MAPS_API_KEY_DEBUG }}
          GOOGLE_MAPS_API_KEY_RELEASE=${{ secrets.GOOGLE_MAPS_API_KEY_RELEASE }}
          EOF

      - name: Inject google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json

      - name: Decode upload keystore
        run: echo "${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload.keystore

      - name: Inject release signing config
        run: |
          cat >> android/local.properties <<EOF
          RELEASE_STORE_FILE=app/upload.keystore
          RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS=${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
          EOF

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build signed release AAB
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon -PversionCodeOverride=${{ github.run_number }}

      - name: Verify the AAB is not debug-signed
        run: |
          AAB=android/app/build/outputs/bundle/release/app-release.aab
          test -f "$AAB" || { echo "::error::AAB not produced"; exit 1; }
          # Fail loudly if the bundle is still signed with the Android debug key.
          if unzip -p "$AAB" META-INF/*.RSA 2>/dev/null | keytool -printcert 2>/dev/null | grep -q "Android Debug"; then
            echo "::error::AAB is debug-signed — upload keystore secrets are missing or misconfigured."
            exit 1
          fi

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: g88-release-aab
          path: apps/mobile/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 14

      # Detect whether the Play service-account secret is configured. We can't
      # reference `secrets.*` directly in a step `if:`, and step-level `env` isn't
      # available in its own `if:` — so map the secret to an output here first.
      - name: Detect Play service-account secret
        id: play
        working-directory: .
        env:
          PLAY_SA_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$PLAY_SA_JSON" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::PLAY_SERVICE_ACCOUNT_JSON not set — skipping auto-publish, artifact uploaded only."
          fi

      # Auto-publish to Google Play. Inert until the owner adds the
      # PLAY_SERVICE_ACCOUNT_JSON secret (a Play service-account key JSON with
      # "Release apps to testing tracks" permission, granted in Play Console →
      # Users and permissions). Skipped when the secret is empty, so the build +
      # artifact path above keeps working unchanged before the Play app exists.
      # `uses:` actions ignore `working-directory`, so releaseFiles is repo-relative.
      - name: Publish to Google Play
        if: ${{ steps.play.outputs.configured == 'true' && github.event.inputs.publish != 'false' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.g88
          releaseFiles: apps/mobile/android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed
