name: Android Release (AAB)

# Builds a signed Android App Bundle for Google Play (closed testing / production).
# Manual via the Actions tab, or automatically on a v* tag push.
# The first upload to the Play Console must be done by hand (Play requires it to
# establish the app); afterwards the .aab artifact from here can be uploaded
# manually or wired to a service-account auto-publish step (see DEPLOY.md).
on:
  workflow_dispatch:
    inputs:
      track:
        description: "Play track to publish to (e.g. closed track name, 'alpha', or 'internal')"
        required: false
        default: "alpha"
      publish:
        description: "Upload the AAB to Play (requires PLAY_SERVICE_ACCOUNT_JSON secret)"
        type: boolean
        required: false
        default: true
      status:
        description: "Release status on the track"
        type: choice
        required: false
        default: "completed"
        options: ["completed", "draft", "halted", "inProgress"]
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Signed AAB
    runs-on: ubuntu-latest
    # Surface secret presence as a plain env value so the publish step's `if:`
    # can gate on it (the `secrets` context isn't allowed in `if:` directly).
    env:
      HAS_PLAY_SA: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON != '' }}
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Inject Maps keys
        run: |
          cat >> android/local.properties <<EOF
          GOOGLE_MAPS_API_KEY_DEBUG=${{ secrets.GOOGLE_MAPS_API_KEY_DEBUG }}
          GOOGLE_MAPS_API_KEY_RELEASE=${{ secrets.GOOGLE_MAPS_API_KEY_RELEASE }}
          EOF

      - name: Inject google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json

      - name: Decode upload keystore
        run: echo "${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload.keystore

      - name: Inject release signing config
        run: |
          cat >> android/local.properties <<EOF
          RELEASE_STORE_FILE=app/upload.keystore
          RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS=${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
          EOF

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build signed release AAB
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon -PversionCodeOverride=${{ github.run_number }}

      - name: Verify the AAB is not debug-signed
        run: |
          AAB=android/app/build/outputs/bundle/release/app-release.aab
          test -f "$AAB" || { echo "::error::AAB not produced"; exit 1; }
          # Fail loudly if the bundle is still signed with the Android debug key.
          if unzip -p "$AAB" META-INF/*.RSA 2>/dev/null | keytool -printcert 2>/dev/null | grep -q "Android Debug"; then
            echo "::error::AAB is debug-signed — upload keystore secrets are missing or misconfigured."
            exit 1
          fi

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: g88-release-aab
          path: apps/mobile/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 14

      # Publishes to the Play track via a service account. Auto-skips until the
      # PLAY_SERVICE_ACCOUNT_JSON secret exists, so the build stays green before
      # automation is set up. Requires the app to already exist in the Console
      # with at least one manual release on the target track (Play API rule).
      - name: Publish to Google Play
        if: >-
          env.HAS_PLAY_SA == 'true' &&
          (github.event_name == 'push' || inputs.publish == true)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.g88
          releaseFiles: apps/mobile/android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ inputs.track || 'alpha' }}
          status: ${{ inputs.status || 'completed' }}
          whatsNewDirectory: apps/mobile/distribution/whatsnew

      - name: Note when publish was skipped
        if: env.HAS_PLAY_SA != 'true'
        run: echo "::notice::PLAY_SERVICE_ACCOUNT_JSON not set — built the AAB but skipped Play upload. Download the g88-release-aab artifact and upload manually, or add the secret to enable automation (see DEPLOY.md)."
