name: Android Release (AAB)

# Builds a signed Android App Bundle for Google Play (closed testing / production).
# Manual via the Actions tab, or automatically on a v* tag push.
# The first upload to the Play Console must be done by hand (Play requires it to
# establish the app); afterwards the .aab artifact from here can be uploaded
# manually or wired to a service-account auto-publish step (see DEPLOY.md).
on:
  workflow_dispatch:
    inputs:
      track:
        description: "Intended Play track (informational only — upload is manual for now)"
        required: false
        default: "internal"
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Signed AAB
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Inject Maps keys
        run: |
          cat >> android/local.properties <<EOF
          GOOGLE_MAPS_API_KEY_DEBUG=${{ secrets.GOOGLE_MAPS_API_KEY_DEBUG }}
          GOOGLE_MAPS_API_KEY_RELEASE=${{ secrets.GOOGLE_MAPS_API_KEY_RELEASE }}
          EOF

      - name: Inject google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json

      - name: Decode upload keystore
        run: echo "${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload.keystore

      - name: Inject release signing config
        run: |
          cat >> android/local.properties <<EOF
          RELEASE_STORE_FILE=app/upload.keystore
          RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS=${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
          EOF

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build signed release AAB
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon -PversionCodeOverride=${{ github.run_number }}

      - name: Verify the AAB is not debug-signed
        run: |
          AAB=android/app/build/outputs/bundle/release/app-release.aab
          test -f "$AAB" || { echo "::error::AAB not produced"; exit 1; }
          # Fail loudly if the bundle is still signed with the Android debug key.
          if unzip -p "$AAB" META-INF/*.RSA 2>/dev/null | keytool -printcert 2>/dev/null | grep -q "Android Debug"; then
            echo "::error::AAB is debug-signed — upload keystore secrets are missing or misconfigured."
            exit 1
          fi

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: g88-release-aab
          path: apps/mobile/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 14
