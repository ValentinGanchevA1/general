# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [master, "claude/**"]
  pull_request:
    branches: [master]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  no-legacy-imports:
    name: No legacy imports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for forbidden legacy/ imports
        run: bash scripts/ci/check-no-legacy-imports.sh

  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # Backend jest + tsc resolve @g88/shared from packages/shared/dist — build it first.
      - name: Build shared
        run: pnpm --filter @g88/shared build
      - name: Lint
        run: pnpm --filter @g88/backend exec eslint src --ext .ts --max-warnings 0
      - name: Typecheck
        run: pnpm --filter @g88/backend typecheck
      - name: Test
        run: pnpm --filter @g88/backend exec jest --ci --runInBand
      - name: Build
        run: pnpm --filter @g88/backend build

  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build shared
        run: pnpm --filter @g88/shared build
      - name: Lint
        run: pnpm --filter @g88/mobile exec eslint src --ext .ts,.tsx --max-warnings 0
      - name: Typecheck
        run: pnpm --filter @g88/mobile typecheck
      - name: Test
        run: pnpm --filter @g88/mobile exec jest --ci
