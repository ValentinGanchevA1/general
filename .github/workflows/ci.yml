name: CI

on:
  push:
    branches: [master, "claude/**"]
  pull_request:
    branches: [master]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  no-legacy-imports:
    name: No legacy imports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for forbidden legacy/ imports
        run: bash scripts/ci/check-no-legacy-imports.sh

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .
      - name: Lint (advisory)
        run: pnpm lint
        continue-on-error: true
      - name: Typecheck (advisory)
        run: pnpm typecheck
        continue-on-error: true
      - name: Build
        run: pnpm build

  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .
      - name: Lint (advisory)
        run: pnpm lint
        continue-on-error: true
      - name: Typecheck (advisory)
        run: pnpm typecheck
        continue-on-error: true
