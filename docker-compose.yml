services:
  postgres:
    build: ./docker/postgres
    container_name: g88-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-g88}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-g88dev}
      POSTGRES_DB: ${POSTGRES_DB:-g88}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-g88}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: g88-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
